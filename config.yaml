# ------------------------------------------------------------------
# 基础通用配置
# ------------------------------------------------------------------
mixed-port: 7890
allow-lan: true
bind-address: "*"
ipv6: false
unified-delay: true
tcp-concurrent: true
log-level: warning
global-client-fingerprint: chrome
keep-alive-idle: 600
keep-alive-interval: 15
profile:
  store-selected: true
  store-fake-ip: true

# 控制面板配置 (跑裸核必开)
external-controller: 0.0.0.0:9090
secret: "123456"  # 外部控制器的密码
external-ui: ui   # 如果你下载了控制面板文件，放在这个目录下

# ------------------------------------------------------------------
# TUN 透明代理配置 (针对你的 with_gvisor 内核优化)
# ------------------------------------------------------------------
tun:
  enable: true
  # system/gvisor/mixed
  stack: mixed
  dns-hijack: ["any:53", "tcp://any:53"]
  #使用nikki，混入全部不修改的情况，开启接口指定为nikki
  #device: nikki
  #使用仅内核自行修改下面三项为true
  auto-route: true
  auto-redirect: true
  auto-detect-interface: true


# DNS 设置 (防泄露 & Fake-IP 模式)
# ------------------------------------------------------------------
dns:
  enable: true
  cache-algorithm: arc
  listen: 0.0.0.0:1053
  ipv6: false
  respect-rules: true
  enhanced-mode: fake-ip
  fake-ip-range: 28.0.0.1/8
  fake-ip-filter-mode: blacklist
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
    - 202.102.224.68
  proxy-server-nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  direct-nameserver:
    - '202.102.224.68'
    - '202.102.227.68'
    - 'https://dns.alidns.com/dns-query'
  nameserver:
    - 'https://1.1.1.1/dns-query'  # Cloudflare，速度快
    - 'https://8.8.8.8/dns-query'  # Google，兼容性最强
  fake-ip-filter:
    - "rule-set:fakeipfilter_domain"
# 机场订阅 & 代理节点
proxy-providers:
  Airport1:
    url: "https://1pyvg.no-mad-world.club/link/0wllHgMEePRBTthX?clash=3"
    type: http
    interval: 86400
    path: ./proxies.yaml
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 300
    proxy: 直连

proxies:
  - {name: 直连, type: direct}

